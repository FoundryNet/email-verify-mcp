name: "@foundrynet/email-verify-mcp"
displayName: "FoundryNet B2B Lead Quality Scorer"
description: >-
  B2B lead quality scoring — validate email, assess domain credibility, and score leads A-F before you invest outreach time. Also provides raw email deliverability and MX verification.
icon: "📧"
homepage: "https://foundrynet.io"
repository: "https://github.com/FoundryNet/email-verify-mcp"
license: "MIT"
categories:
  - data
  - business
  - email
tags:
  - lead-scoring
  - sales-prospecting
  - email-quality
  - b2b-leads
  - outreach-validation
  - email-verification
  - mx-validation
  - disposable-detection
  - deliverability
keywords:
  - lead-scoring
  - sales-prospecting
  - email-quality
  - b2b-leads
  - outreach-validation
  - email-verification
  - mx-validation
  - disposable-detection
  - deliverability
attestation:
  protocol: "MINT Protocol"
  verified_outputs: true
  live_feed: "https://mint.foundrynet.io/feed"
network:
  name: "FoundryNet Data Network"
  servers: 17
startCommand:
  type: http
  url: "https://email-verify-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query x402 paywall and bill to a Forge account."
